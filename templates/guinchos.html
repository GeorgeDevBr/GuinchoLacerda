<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../statics/css/bootstrap.min.css">
    <title>Guinchos</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1>Cadastrar Guincho</h1>
                <form action="/cadastrar_guincho" method="post">
                    <table class="table">
                        <tr>
                            <td><label for="placa">Placa:</label></td>
                            <td><input type="text" id="placa" name="placa" required></td>
                        </tr>
                        <tr>
                            <td><label for="modelo">Modelo:</label></td>
                            <td><input type="text" id="modelo" name="modelo" required></td>
                        </tr>
                        <tr>
                            <td><label for="motorista_id">Motorista:</label></td>
                            <td><input type="number" id="motorista_id" name="motorista_id"></td>
                        </tr>
                        <tr>
                            <td><label for="secretaria_id">Secretaria:</label></td>
                            <td><input type="number" id="secretaria_id" name="secretaria_id" required></td>
                        </tr>
                        <tr>
                            <td><label for="disponivel">Disponível:</label></td>
                            <td>
                                <select id="disponivel" name="disponivel" required>
                                    <option value="1">Sim</option>
                                    <option value="0">Não</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2"><button type="submit">Cadastrar</button></td>
                        </tr>
                    </table>
                </form>
            </div>
            <div class="col-md-6">
                <table>
                    <tr>
                        <td><h1>Guinchos</h1></td>
                        <td><input type="text" id="pesquisa" onkeyup="filtrarAnexos()" placeholder="Pesquisar anexos...">    </td>
                    </tr>
                </table>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Placa</th>
                            <th>Modelo</th>
                            <th>Motorista</th>
                            <th>Secretaria</th>
                            <th>Disponível</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>ABC-1234</td>
                            <td>Modelo X</td>
                            <td>João</td>
                            <td>Maria</td>
                            <td>Sim</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../statics/js/guinchos.js"></script>
    <script src="../statics/js/bootstrap.bundle.min.js"></script>
</body>
</html>
