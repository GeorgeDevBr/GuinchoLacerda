<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../statics/css/bootstrap.min.css">
    <title>Solicitações de Guincho</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1>Cadastrar Solicitação de Guincho</h1>
                <form action="/cadastrar_solicitacao" method="post">
                    <table class="table">
                        <tr>
                            <td><label for="data_solicitacao">Data Solicitação:</label></td>
                            <td><input type="date" id="data_solicitacao" name="data_solicitacao" required></td>
                        </tr>
                        <tr>
                            <td><label for="guincho_id">Guincho:</label></td>
                            <td><input type="number" id="guincho_id" name="guincho_id" required></td>
                        </tr>
                        <tr>
                            <td><label for="tipo_solicitacao">Tipo Solicitação:</label></td>
                            <td>
                                <select id="tipo_solicitacao" name="tipo_solicitacao" required>
                                    <option value="Particular">Particular</option>
                                    <option value="Seguradora">Seguradora</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="protocolo">Protocolo:</label></td>
                            <td><input type="text" id="protocolo" name="protocolo"></td>
                        </tr>
                        <tr>
                            <td><label for="origem">Origem:</label></td>
                            <td><input type="text" id="origem" name="origem" required></td>
                        </tr>
                        <tr>
                            <td><label for="destino">Destino:</label></td>
                            <td><input type="text" id="destino" name="destino" required></td>
                        </tr>
                        <tr>
                            <td><label for="status">Status:</label></td>
                            <td>
                                <select id="status" name="status" required>
                                    <option value="Em andamento">Em andamento</option>
                                    <option value="Finalizado">Finalizado</option>
                                    <option value="Cancelado">Cancelado</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2"><button type="submit">Cadastrar</button></td>
                        </tr>
                    </table>
                </form>
            </div>
            <div class="col-md-6">
                <h1>Solicitações de Guincho</h1>
                <input type="text" id="pesquisa" onkeyup="filtrarSolicitacoes()" placeholder="Pesquisar solicitações...">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Data Solicitação</th>
                            <th>Guincho</th>
                            <th>Tipo Solicitação</th>
                            <th>Protocolo</th>
                            <th>Origem</th>
                            <th>Destino</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>2023-10-01</td>
                            <td>João</td>
                            <td>Particular</td>
                            <td>12345</td>
                            <td>Rua A</td>
                            <td>Rua B</td>
                            <td>Em andamento</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../statics/js/solicitacoes_guinchamento.js"></script>
    <script src="../statics/js/bootstrap.bundle.min.js"></script>
</body>
</html>
