<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../statics/css/bootstrap.min.css">
    <title>Transações</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1>Cadastrar Transação</h1>
                <form action="/cadastrar_transacao" method="post">
                    <table class="table">
                        <tr>
                            <td><label for="data">Data:</label></td>
                            <td><input type="date" id="data" name="data" required></td>
                        </tr>
                        <tr>
                            <td><label for="valor">Valor:</label></td>
                            <td><input type="number" id="valor" name="valor" step="0.01" required></td>
                        </tr>
                        <tr>
                            <td><label for="categoria">Categoria:</label></td>
                            <td><input type="text" id="categoria" name="categoria" required></td>
                        </tr>
                        <tr>
                            <td><label for="descricao">Descrição:</label></td>
                            <td><textarea id="descricao" name="descricao" required></textarea></td>
                        </tr>
                        <tr>
                            <td><label for="metodo_pagamento">Método de Pagamento:</label></td>
                            <td>
                                <select id="metodo_pagamento" name="metodo_pagamento" required>
                                    <option value="Pix">Pix</option>
                                    <option value="Cartão">Cartão</option>
                                    <option value="Dinheiro">Dinheiro</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="status">Status:</label></td>
                            <td>
                                <select id="status" name="status" required>
                                    <option value="Pago">Pago</option>
                                    <option value="Pendente">Pendente</option>
                                    <option value="Parcelado">Parcelado</option>
                                </select>
                            </td>
                        </tr>
                        
                        <tr>
                            <td><label for="anexos">Anexos:</label></td>
                            <td><input type="file" id="anexos" name="anexos[]" multiple required></td>
                        </tr>
        
                            <td colspan="2"><button type="submit">Cadastrar</button></td>
                    </tr>
                    </table>
                </form>
            </div>
            <div class="col-md-6">
                <h1>Transações</h1>
                <input type="text" id="pesquisa" onkeyup="filtrarTransacoes()" placeholder="Pesquisar transações...">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Data</th>
                            <th>Valor</th>
                            <th>Categoria</th>
                            <th>Descrição</th>
                            <th>Método de Pagamento</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>2023-10-01</td>
                            <td>150.00</td>
                            <td>Serviço</td>
                            <td>Guinchamento</td>
                            <td>Pix</td>
                            <td>Pago</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../statics/js/transacoes.js"></script>
    <script src="../statics/js/bootstrap.bundle.min.js"></script>
</body>
</html>
