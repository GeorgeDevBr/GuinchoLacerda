<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitações de Guincho</title>
    <script>
        function filtrarSolicitacoes() {
            const input = document.getElementById('pesquisa');
            const filter = input.value.toLowerCase();
            const rows = document.querySelectorAll('table tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                let match = false;
                cells.forEach(cell => {
                    if (cell.textContent.toLowerCase().includes(filter)) {
                        match = true;
                    }
                });
                row.style.display = match ? '' : 'none';
            });
        }
    </script>
</head>
<body>
    <div style="display: flex;">
        <div style="width: 50%;">
            <h1>Cadastrar Solicitação de Guincho</h1>
            <form action="/cadastrar_solicitacao" method="post">
                <label for="data_solicitacao">Data Solicitação:</label>
                <input type="date" id="data_solicitacao" name="data_solicitacao" required><br>
                <label for="guincho_id">Guincho ID:</label>
                <input type="number" id="guincho_id" name="guincho_id" required><br>
                <label for="tipo_solicitacao">Tipo Solicitação:</label>
                <select id="tipo_solicitacao" name="tipo_solicitacao" required>
                    <option value="Particular">Particular</option>
                    <option value="Seguradora">Seguradora</option>
                </select><br>
                <label for="protocolo">Protocolo:</label>
                <input type="text" id="protocolo" name="protocolo"><br>
                <label for="origem">Origem:</label>
                <input type="text" id="origem" name="origem" required><br>
                <label for="destino">Destino:</label>
                <input type="text" id="destino" name="destino" required><br>
                <label for="status">Status:</label>
                <select id="status" name="status" required>
                    <option value="Em andamento">Em andamento</option>
                    <option value="Finalizado">Finalizado</option>
                    <option value="Cancelado">Cancelado</option>
                </select><br>
                <button type="submit">Cadastrar</button>
            </form>
        </div>
        <div style="width: 50%;">
            <h1>Solicitações de Guincho</h1>
            <input type="text" id="pesquisa" onkeyup="filtrarSolicitacoes()" placeholder="Pesquisar solicitações...">
            <table border="1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data Solicitação</th>
                        <th>Guincho ID</th>
                        <th>Tipo Solicitação</th>
                        <th>Protocolo</th>
                        <th>Origem</th>
                        <th>Destino</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Exemplo de linha de solicitação -->
                    <tr>
                        <td>1</td>
                        <td>2023-10-01</td>
                        <td>4</td>
                        <td>Particular</td>
                        <td>12345</td>
                        <td>Rua A</td>
                        <td>Rua B</td>
                        <td>Em andamento</td>
                    </tr>
                    <!-- Mais linhas de solicitações aqui -->
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
